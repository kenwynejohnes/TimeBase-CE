name: Semgrep SAST - Security Only

on:
  push:
    branches: [main-6.1]
  pull_request:
    branches: [main-6.1]

jobs:
  semgrep:
    name: Run Semgrep (Security Rules Only)
    runs-on: ubuntu-latest

    steps:
      # 1️⃣  Checkout sources
      - uses: actions/checkout@v3

      # 2️⃣  Python tool-chain (for Semgrep + helper script)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣  Install Semgrep CLI
      - name: Install Semgrep
        run: pip install semgrep

      # 4️⃣  jq for quick JSON slicing
      - name: Install jq
        run: sudo apt-get install -y jq

      # 5️⃣  Run Semgrep Security rules only
      - name: Run Semgrep Scan with Security Rules
        run: semgrep --config p/ci . --json > semgrep_output.json

      # 6️⃣  Distil Semgrep JSON ➜ minimal summary the triage agent expects
      - name: Extract Findings from Semgrep Output
        run: |
          jq -c '{results: [.results[] | {
            path: .path,
            rule_id: .check_id,
            message: .extra.message,
            start_line: .start.line,
            code: .extra.lines
          }]}' semgrep_output.json > semgrep_summary.json

      # 7️⃣  Call your triage agent and save its answer
      - name: Send Findings to Triage Agent
        run: |
          echo "Sending findings to triage agent..."
          JSON_INPUT=$(jq -c . < semgrep_summary.json)
          PAYLOAD=$(jq -n --arg input "$JSON_INPUT" '{chat_history: [], user_input: $input}')
          curl -s \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ELITEA_TOKEN }}" \
            -X POST \
            -d "$PAYLOAD" \
            https://nexus.elitea.ai/api/v1/applications/predict/prompt_lib/2583/97 \
            > agent_response.json
          echo "Agent verdict saved to agent_response.json"
          cat agent_response.json

      # 8️⃣  Craft pretty Slack message (with direct links) & post it
      - name: Send Agent Verdict to Slack
        env:
          REPO_URL: https://github.com/kenwynejohnes/TimeBase-CE/blob/main-6.1
        run: |
          echo "Preparing Slack message…"
          python3 <<'PY'
          import json, re, os, pathlib

          # ---------- load artefacts ----------
          findings = json.load(open("semgrep_summary.json"))["results"]
          chat     = json.load(open("agent_response.json"))
          assistant = next(m["content"] for m in chat["chat_history"] if m["role"] == "assistant")

          # ---------- split assistant answer by '---' separator ----------
          blocks = re.split(r'\n\s*---\s*\n', assistant.strip())

          enhanced_blocks = []
          for idx, blk in enumerate(blocks):
              if idx < len(findings):
                  f = findings[idx]
                  link = (
                      f"{os.environ['REPO_URL']}/{f['path']}#L{f['start_line']}"
                  )
                  blk = blk.rstrip() + f"\nLink:\n{link}"
              enhanced_blocks.append(blk)

          summary = "\n------------------------------\n\n".join(enhanced_blocks)

          payload = {
              "text": f"🔍 *Agent Verdict Summary:*\n```{summary}```"
          }

          pathlib.Path("slack_payload.json").write_text(json.dumps(payload, ensure_ascii=False))
          PY

          echo "Posting to Slack…"
          curl -X POST -H 'Content-type: application/json' \
               --data @slack_payload.json \
               ${{ secrets.SLACK_WEBHOOK_URL }}
