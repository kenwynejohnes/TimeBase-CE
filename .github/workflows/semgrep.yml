name: Semgrep SAST - Security only rules

on:
  push:
    branches: [main-6.1]
  pull_request:
    branches: [main-6.1]

jobs:
  semgrep:
    name: Run Semgrep (Security Rules Only)
    runs-on: ubuntu-latest

    steps:
      # 1️⃣  Checkout sources
      - uses: actions/checkout@v3

      # 2️⃣  Python tool-chain (for Semgrep + helper script)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣  Install Semgrep CLI
      - name: Install Semgrep
        run: pip install semgrep

      # 4️⃣  jq for quick JSON slicing
      - name: Install jq
        run: sudo apt-get install -y jq

      # 5️⃣  Run Semgrep Security rules only
      - name: Run Semgrep Scan with Security Rules
        run: semgrep --config p/ci . --json > semgrep_output.json

      # 6️⃣  Process each finding individually
      - name: Process Findings One by One
        env:
          REPO_URL: https://github.com/kenwynejohnes/TimeBase-CE/blob/main-6.1
        run: |
          # Get the number of findings
          NUM_FINDINGS=$(jq '.results | length' semgrep_output.json)
          echo "Found $NUM_FINDINGS security issues to process"

          # Process each finding
          for i in $(seq 0 $((NUM_FINDINGS-1))); do
            echo "Processing finding $((i+1)) of $NUM_FINDINGS..."
            
            # Extract single finding
            jq -c "{results: [.results[$i]]}" semgrep_output.json > current_finding.json
            
            # Send to triage agent
            echo "Sending to triage agent..."
            JSON_INPUT=$(jq -c . < current_finding.json)
            PAYLOAD=$(jq -n --arg input "$JSON_INPUT" '{chat_history: [], user_input: $input}')
            curl -s \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.ELITEA_TOKEN }}" \
              -X POST \
              -d "$PAYLOAD" \
              https://nexus.elitea.ai/api/v1/applications/predict/prompt_lib/2583/34 \
              > agent_response.json

            # Format agent's response and prepare Slack message
            python3 .github/workflows/process_finding.py

            # Send to Slack
            echo "Sending to Slack..."
            curl -X POST -H 'Content-type: application/json' \
                 --data @slack_payload.json \
                 ${{ secrets.SLACK_WEBHOOK_URL }}

            # Add a small delay between findings
            sleep 2
          done
